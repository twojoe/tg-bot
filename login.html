<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>管理员 Google 登录</title>
    <style>
        #g_id_onload,
        .g_id_signin {
            width: 200px;
        }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div style="margin: 10px auto;width: 300px;">
        <h2>管理员登录</h2>

        <div id="g_id_onload" data-client_id="577060628660-gbq6ekfja584ri1736o8ogseee60qpou.apps.googleusercontent.com"
            data-context="signin" data-ux_mode="popup" data-callback="onGoogleSignIn" data-auto_prompt="false">
        </div>

        <div class="g_id_signin" data-type="standard"></div>
    </div>


    <script>
        async function onGoogleSignIn(response) {
            console.log("收到 JWT Token，正在发送至后端...");

            // 4. 将 Token 发送到 Vercel 后端接口
            const res = await fetch('/api/auth_google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken: response.credential })
            });

            const result = await res.json();
            if (result.success) {
                window.location.href = 'admin.html';
            } else {
                alert("登录失败：" + result.error);
            }
        }
    </script>
</body>

</html>
